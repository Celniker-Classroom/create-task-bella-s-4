<!-- A to do list that you can add and remove tasks from and to mark how much you have done and are going to do. 
 will be separated into four different categories of Work, Homework, Chores, and Projects 
 may allow user to add more categories if they want
 once task is complete, box is checked and each category has its own percentage for how much work done
 also will have a total % for how much is done at the top of the website-->
<body>
    <h1>What's To Do?</h1>
    <h2>Let's Get To Work!</h2>
    <h3>You have completed % of your total tasks!</h3>
    <div class = "category"> </div><h3>Work:</h3> <h4>% Done</h4> </div>
        <input type = "checkbox"> <input type "text" placeholder = "Enter task here"> 
    <h3>Homework:</h3> <h4>% Done</h4>
        <input type = "checkbox"> <input type "text" placeholder = "Enter task here"> 
    <h3>Chores:</h4> <h4>% Done</h4>
        <input type = "checkbox"> <input type "text" placeholder = "Enter task here"> 
    <h3>Projects:</h3> <h4>% Done</h4>
        <input type = "checkbox"> <input type "text" placeholder = "Enter task here"> 
    <!-- <br>See the <a href="README.md">README</a> for project details -->
</body>
</html>
